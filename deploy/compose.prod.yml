# Production sur le Proxmox (VM/LXC avec Docker).
# Usage : copier ce fichier + un .env (voir .env.example, section production)
#   docker compose -f compose.prod.yml up -d
# AUCUN port publié sur l'hôte : seule la sortie cloudflared expose l'app.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?definir POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: trackly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trackly -d trackly']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/${GHCR_OWNER:?definir GHCR_OWNER dans .env}/trackly-api:${TAG:-latest}
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://trackly:${POSTGRES_PASSWORD}@postgres:5432/trackly
      # URL publique — sert à construire les liens de réinitialisation (Lot 1)
      APP_URL: ${APP_URL:-https://trackly.clemhouse.uk}
      # Optionnel : sans clé l'envoi est désactivé, sans journaliser les jetons.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-Trackly <onboarding@resend.dev>}
      # Sources de métadonnées (Lot 2) — sans clés, la recherche renvoie un mode dégradé
      TMDB_API_TOKEN: ${TMDB_API_TOKEN:-}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID:-}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health >/dev/null']
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/${GHCR_OWNER}/trackly-web:${TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - api

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?definir CLOUDFLARE_TUNNEL_TOKEN dans .env}
    depends_on:
      - web

volumes:
  pgdata:
