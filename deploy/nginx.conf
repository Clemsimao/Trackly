server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Assets fingerprintés par Vite : cache long
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker : jamais mis en cache, sinon `autoUpdate` ne se déclenche pas
    # et un utilisateur installé reste bloqué sur l'ancienne version.
    # Attention : Cloudflare met les .js en cache et impose son TTL navigateur —
    # il faut AUSSI une Cache Rule « Bypass cache » sur /sw.js et /registerSW.js.
    location ~ ^/(sw\.js|registerSW\.js)$ {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    # nginx ne connaît pas l'extension .webmanifest (servie en octet-stream sinon)
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # API : proxy vers le conteneur api (même chemin qu'en dev)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA : toutes les routes retombent sur index.html
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
