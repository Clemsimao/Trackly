server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Répété dans les locations qui définissent Cache-Control, car nginx ne fait
    # pas hériter les add_header du niveau parent dans ce cas.
    include /etc/nginx/snippets/security-headers.conf;

    # Assets fingerprintés par Vite : cache long
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker : jamais mis en cache, sinon `autoUpdate` ne se déclenche pas
    # et un utilisateur installé reste bloqué sur l'ancienne version.
    # Attention : Cloudflare met les .js en cache et impose son TTL navigateur —
    # il faut AUSSI une Cache Rule « Bypass cache » sur /sw.js et /registerSW.js.
    location ~ ^/(sw\.js|registerSW\.js)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    # nginx ne connaît pas l'extension .webmanifest (servie en octet-stream sinon)
    location = /manifest.webmanifest {
        include /etc/nginx/snippets/security-headers.conf;
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # API : proxy vers le conteneur api (même chemin qu'en dev)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        # Le tunnel Cloudflare est l'unique entrée publique. On remplace la
        # chaîne reçue au lieu de propager un X-Forwarded-For arbitraire.
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP "";
    }

    # SPA : toutes les routes retombent sur index.html
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
