# Environnement de développement : uniquement les services d'infrastructure.
# L'API et le front tournent en local avec hot reload : `pnpm dev`.
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trackly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackly}
      POSTGRES_DB: ${POSTGRES_DB:-trackly}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
