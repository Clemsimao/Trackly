name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Levier manuel : GitHub laisse parfois tomber le déclenchement sur push quand
  # deux poussées arrivent quasi simultanément (0 run créé pour le SHA). Permet
  # de relancer sans commit vide : `gh workflow run ci.yml --ref main`.
  workflow_dispatch:

jobs:
  quality:
    name: Lint, typecheck, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version lue depuis packageManager

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Build (contracts → api, web — génère aussi le client Prisma)
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Tests
        run: pnpm test

  e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: trackly
          POSTGRES_PASSWORD: trackly
          POSTGRES_DB: trackly_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U trackly"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://trackly:trackly@localhost:5432/trackly_e2e
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Migrations
        run: pnpm --filter @trackly/api exec prisma migrate deploy

      - name: Navigateur Playwright
        run: pnpm --filter @trackly/web exec playwright install --with-deps chromium

      - name: Parcours E2E
        run: pnpm --filter @trackly/web run e2e

  docker:
    name: Images Docker → GHCR
    # Publication uniquement sur main : les images taggées latest + sha
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [quality, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Les noms d'images Docker doivent être en minuscules (le compte GitHub peut ne pas l'être)
      - name: Owner en minuscules
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/api.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/trackly-api:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/trackly-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/web.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/trackly-web:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/trackly-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
